# Local Graph Node for indexing the Hardhat chain (no Sepolia needed).
# From repo root: docker compose up
# Then create/deploy subgraph (see subgraph/README.md "Local Graph Node").
#
# Required: set GRAPH_POSTGRES_PASSWORD (e.g. in a .env file in this directory).
# Used by both graph-node and postgres. No default.

services:
  graph-node:
    image: graphprotocol/graph-node
    ports:
      - "8000:8000"
      - "8001:8001"
      - "8020:8020"
      - "8030:8030"
      - "8040:8040"
    depends_on:
      - ipfs
      - postgres
    extra_hosts:
      - host.docker.internal:host-gateway
    environment:
      postgres_host: postgres
      postgres_user: graph-node
      postgres_pass: ${GRAPH_POSTGRES_PASSWORD}
      postgres_db: graph-node
      ipfs: "ipfs:5001"
      ethereum: "localhost:http://host.docker.internal:8545"
      GRAPH_LOG: info
  ipfs:
    image: ipfs/go-ipfs:v0.10.0
    ports:
      - "5001:5001"
    volumes:
      - ./data/ipfs:/data/ipfs
  postgres:
    image: postgres
    ports:
      - "5432:5432"
    command:
      - "postgres"
      - "-cshared_preload_libraries=pg_stat_statements"
    environment:
      POSTGRES_USER: graph-node
      POSTGRES_PASSWORD: ${GRAPH_POSTGRES_PASSWORD}
      POSTGRES_DB: graph-node
      PGDATA: "/data/postgres"
      # Graph Node requires C locale (see graph-node docs)
      POSTGRES_INITDB_ARGS: "--locale=C --encoding=UTF8"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
